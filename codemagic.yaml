# Codemagic CI/CD config for KidTrack
# Docs: https://docs.codemagic.io/yaml-quick-start/building-a-flutter-app/
#
# Android signing works automatically because key.properties + keystore.jks
# are committed to this (private) repo, so no extra Codemagic setup is needed
# for Android. iOS needs an App Store Connect API key configured in the
# Codemagic UI (see notes at the bottom of this file).

workflows:
  # ----------------------------------------------------------------------
  # ANDROID — builds a release APK (for manual install) and AAB (Play Store)
  # ----------------------------------------------------------------------
  android-workflow:
    name: Android Build
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: 3.41.9   # matches the local Flutter version; change to "stable" if needed
    scripts:
      - name: Flutter version
        script: flutter --version
      - name: Get Flutter packages
        script: flutter pub get
      - name: Build APK (release)
        script: flutter build apk --release
      - name: Build App Bundle (release)
        script: flutter build appbundle --release
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
      - build/app/outputs/bundle/release/*.aab
      - build/app/outputs/**/mapping.txt
    publishing:
      email:
        recipients:
          - msheikh@tharaco.sa
        notify:
          success: true
          failure: true
      # To auto-upload to Google Play, add a Google Play service account in
      # Codemagic UI, then uncomment:
      # google_play:
      #   credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
      #   track: internal

  # ----------------------------------------------------------------------
  # iOS — builds a signed IPA (App Store / TestFlight)
  # Requires an App Store Connect API key set up in Codemagic UI.
  # ----------------------------------------------------------------------
  ios-workflow:
    name: iOS Build
    instance_type: mac_mini_m2
    max_build_duration: 90
    integrations:
      # Name of the App Store Connect API key you create in Codemagic UI
      # (Team settings > Integrations > Developer Portal). Rename to match.
      app_store_connect: CodemagicAppStoreKey
    environment:
      flutter: 3.41.9
      vars:
        BUNDLE_ID: "com.elsheikh.whatscamp"
    scripts:
      - name: Flutter version
        script: flutter --version
      - name: Get Flutter packages
        script: flutter pub get
      - name: Install CocoaPods dependencies
        script: find . -name "Podfile" -execdir pod install \;
      - name: Set up code signing (regenerates profile with current capabilities)
        script: |
          # Delete any existing App Store profiles for this bundle id first.
          # fetch-signing-files REUSES an existing profile if it finds one, so a
          # stale profile (e.g. one created before Push Notifications was enabled
          # on the App ID) keeps getting reused and the build fails with
          # "requires a provisioning profile with the Push Notifications feature".
          # Removing them forces a fresh profile that includes every capability
          # currently enabled on the App ID.
          app-store-connect list-profiles \
            --bundle-id-identifier "$BUNDLE_ID" \
            --profile-type IOS_APP_STORE \
            --json | jq -r '.[].id' | while read -r PROFILE_ID; do
              [ -n "$PROFILE_ID" ] && app-store-connect delete-profile "$PROFILE_ID" || true
            done

          # Now create a fresh App ID (if missing), distribution cert & profile.
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
          keychain initialize
          keychain add-certificates
          xcode-project use-profiles
      - name: Build signed IPA
        script: flutter build ipa --release --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      email:
        recipients:
          - msheikh@tharaco.sa
        notify:
          success: true
          failure: true
      # To auto-upload to TestFlight, uncomment:
      # app_store_connect:
      #   auth: integration
      #   submit_to_testflight: true
